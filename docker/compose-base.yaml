name: nostr-agent

secrets:
  api-key-secret:
    file: /volume1/ros/secrets/deepseek_secret

networks:
  nostr-net:
    external: true

services:
  # -- GATEWAY: API SECURE PROXY --
  api-gateway:
    image: nginx:alpine
    container_name: nostr-api-gate
    networks:
      - nostr-net
    env_file:
      - ../.env
    secrets:
      - api-key-secret
    volumes:
      - ../config/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        UPSTREAM_API_KEY="$(cat /run/secrets/api-key-secret | tr -d '\n\r')"
        export UPSTREAM_API_KEY
        exec /docker-entrypoint.sh nginx -g "daemon off;"
    restart: always

  # -- CORE: (Brain, Nostr Bridge & REPL) --
  base:
    build:
      context: ..
      dockerfile: docker/Dockerfile.base
    image: bob-nostr:latest
    container_name: nostr-agent
    ports:
      - "8000:8000"
    networks:
      - nostr-net
    env_file:
      - ../.env
    environment:
      - AGENT_ID=${AGENT_ID:-nostr-agent}
      - ROS_NAMESPACE=${ROS_NAMESPACE:-/nostr}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-55}
      - BOB_LAUNCH_AUTOABORT=0
      - LLM_TOOL_INTERFACES=/ros2_ws/src/bob_llm/config/skill_tools.py
      - LLM_SKILL_DIR=/ros2_ws/src/bob_nostr/skills
    command: ros2 launch bob_launch generic.launch.py config:=/ros2_ws/src/bob_nostr/launch/base_launch.yaml
    restart: on-failure
    volumes:
      - ../:/ros2_ws/src/bob_nostr:ro
      - /dev/null:/ros2_ws/src/bob_nostr/.env.signer:ro
      - /volume1/ros/nostr_agent:/home/ros/agent
      - /volume1/ros/nostr_agent/tmp:/tmp
      - ../config/_bashrc:/home/ros/.bashrc:ro

  # -- REPL: HARDENED SANDBOX --
  repl:
    image: bob-nostr:latest
    container_name: nostr-repl
    networks:
      - nostr-net
    env_file:
      - ../.env
    environment:
      - ROS_NAMESPACE=${ROS_NAMESPACE:-/nostr}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-55}
    command: ros2 run bob_nostr repl --ros-args -r __ns:=${ROS_NAMESPACE:-/nostr}
    restart: on-failure
    volumes:
      - ../:/ros2_ws/src/bob_nostr:ro
      - /dev/null:/ros2_ws/src/bob_nostr/.env.signer:ro
      - /volume1/ros/nostr_agent/shared:/home/ros/agent/shared:rw
      - /volume1/ros/nostr_agent/tmp:/tmp
      - ../config/_bashrc:/home/ros/.bashrc:ro
